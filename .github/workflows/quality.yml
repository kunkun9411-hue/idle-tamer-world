name: Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  foundation:
    name: Foundation contracts and browser flow
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-assets.txt

      - name: Install project dependencies
        run: pnpm install --frozen-lockfile

      - name: Install asset validator
        run: pip install --requirement requirements-assets.txt

      - name: Run unit, content, build, roadmap and asset checks
        run: pnpm check

      - name: Install Chromium and Linux browser dependencies
        run: pnpm exec playwright install --with-deps chromium

      - name: Run desktop, tablet and mobile browser checks
        run: pnpm test:e2e

      - name: Upload Playwright report on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
