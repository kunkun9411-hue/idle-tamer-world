name: Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  foundation:
    name: Foundation contracts and browser flow
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: idle_tamer_test
          POSTGRES_USER: idle_tamer
          POSTGRES_PASSWORD: idle_tamer_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U idle_tamer -d idle_tamer_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://idle_tamer:idle_tamer_ci@127.0.0.1:5432/idle_tamer_test
      TEST_DATABASE_URL: postgres://idle_tamer:idle_tamer_ci@127.0.0.1:5432/idle_tamer_test
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-assets.txt

      - name: Install project dependencies
        run: pnpm install --frozen-lockfile

      - name: Install asset validator
        run: pip install --requirement requirements-assets.txt

      - name: Migrate PostgreSQL 18 test database down and up
        run: |
          pnpm db:migrate
          pnpm db:rollback
          pnpm db:migrate

      - name: Run unit, PostgreSQL, content, build, roadmap and asset checks
        run: pnpm check

      - name: Restore backup into a clean database and verify ledger
        run: bash infra/scripts/verify-restore.sh

      - name: Install Chromium and Linux browser dependencies
        run: pnpm --filter @idle-tamer/web exec playwright install --with-deps chromium

      - name: Run desktop, tablet and mobile browser checks
        run: pnpm test:e2e

      - name: Upload Playwright report on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
