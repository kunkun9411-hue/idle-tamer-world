name: idle-tamer-local

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: idle_tamer
      POSTGRES_USER: idle_tamer
      POSTGRES_PASSWORD: idle_tamer_local
      TZ: UTC
    ports:
      - "127.0.0.1:54329:5432"
    volumes:
      - idle-tamer-postgres:/var/lib/postgresql
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idle_tamer -d idle_tamer"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  idle-tamer-postgres:
