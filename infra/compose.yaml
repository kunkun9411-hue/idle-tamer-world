name: idle-tamer-local

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-idle_tamer}
      POSTGRES_USER: ${POSTGRES_USER:-idle_tamer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-idle_tamer_local}
      TZ: UTC
    ports:
      - "${POSTGRES_BIND_ADDRESS:-127.0.0.1}:${POSTGRES_PORT:-54329}:5432"
    volumes:
      - idle-tamer-postgres:/var/lib/postgresql
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  idle-tamer-postgres:
